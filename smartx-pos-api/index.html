<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMART X - لوحة تحكم الترخيص</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; color: #3b82f6; margin-bottom: 24px; font-size: 24px; }
    .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card h2 { font-size: 16px; margin-bottom: 12px; color: #94a3b8; }
    .btn { padding: 8px 16px; border-radius: 8px; border: none; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-success { background: #22c55e; color: #fff; }
    .btn-warning { background: #f59e0b; color: #fff; }
    input, select { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-family: inherit; font-size: 13px; margin-bottom: 8px; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: right; padding: 8px 10px; border-bottom: 1px solid #334155; color: #94a3b8; font-size: 12px; white-space: nowrap; }
    td { padding: 8px 10px; border-bottom: 1px solid #1e293b; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-active { background: rgba(34,197,94,0.2); color: #22c55e; }
    .badge-inactive { background: rgba(239,68,68,0.2); color: #ef4444; }
    .badge-lifetime { background: rgba(59,130,246,0.2); color: #3b82f6; }
    .actions { display: flex; gap: 4px; }
    .login-box { max-width: 400px; margin: 100px auto; text-align: center; }
    .login-box input { text-align: center; }
    .flex { display: flex; gap: 8px; align-items: end; }
    .flex input { flex: 1; margin-bottom: 0; }
    .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; z-index: 999; }
    .toast-success { background: #22c55e; }
    .toast-error { background: #ef4444; }
    .hidden { display: none; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat { background: #1e293b; border-radius: 12px; padding: 16px; text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: #3b82f6; }
    .stat-label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .key-display { direction: ltr; font-size: 12px; background: #0f172a; padding: 6px 10px; border-radius: 6px; font-family: monospace; word-break: break-all; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .header-row h1 { margin-bottom: 0; }
    .refresh-btn { font-size: 18px; padding: 8px 16px; }
    .activation-details { font-size: 11px; color: #94a3b8; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div id="login-section">
      <div class="login-box card">
        <h1>SMART X</h1>
        <h2 style="font-size:14px;color:#94a3b8;margin-bottom:16px">لوحة تحكم الترخيص</h2>
        <input type="password" id="adminKeyInput" placeholder="مفتاح المشرف" />
        <button class="btn btn-primary" id="loginBtn" style="width:100%;padding:12px">دخول</button>
      </div>
    </div>

    <div id="dashboard-section" class="hidden">
      <div id="newKeyResult" class="hidden" style="background:#1e293b;border-radius:12px;padding:16px;margin-bottom:16px;text-align:center;border:1px solid #22c55e">
        <div style="font-size:13px;color:#22c55e;margin-bottom:8px;font-weight:600">✅ تم إنشاء المفتاح بنجاح</div>
        <div class="key-display" id="newKeyValue" style="margin-bottom:8px"></div>
        <button class="btn btn-primary" id="copyKeyBtn">نسخ المفتاح</button>
        <button class="btn btn-danger" id="closeResultBtn" style="margin-right:8px">إغلاق</button>
      </div>

      <div class="header-row">
        <h1>لوحة تحكم الترخيص</h1>
        <div>
          <button class="btn btn-primary refresh-btn" id="refreshBtn" onclick="loadKeys()">⟳ تحديث</button>
        </div>
      </div>

      <div class="stats" id="stats"></div>
      <div class="card">
        <h2>إنشاء مفتاح جديد</h2>
        <div class="flex">
          <select id="newKeyType">
            <option value="lifetime">مدى الحياة</option>
            <option value="year">سنة</option>
            <option value="half_year">6 أشهر</option>
            <option value="quarter">3 أشهر</option>
            <option value="month">شهر</option>
          </select>
          <button class="btn btn-success" id="createKeyBtn">إنشاء</button>
        </div>
      </div>
      <div class="card">
        <h2>المفاتيح</h2>
        <div id="keys-table"></div>
      </div>
    </div>
  </div>

  <script>
    var API = '/api'
    var adminKey = ''
    var lastCreatedKey = ''

    function toast(msg, type) {
      if (!type) type = 'success'
      var d = document.createElement('div')
      d.className = 'toast toast-' + type
      d.textContent = msg
      document.body.appendChild(d)
      setTimeout(function() { d.remove() }, 3000)
    }

    function login() {
      adminKey = document.getElementById('adminKeyInput').value
      if (!adminKey) return toast('الرجاء إدخال مفتاح المشرف', 'error')
      document.getElementById('login-section').classList.add('hidden')
      document.getElementById('dashboard-section').classList.remove('hidden')
      loadKeys()
    }

    function apiCall(endpoint, method, body) {
      if (!method) method = 'GET'
      var opts = { method: method, headers: { 'x-admin-key': adminKey, 'Content-Type': 'application/json' } }
      if (body) opts.body = JSON.stringify(body)
      return fetch(API + endpoint, opts).then(function(res) { return res.json() })
    }

    function loadKeys() {
      apiCall('/listKeys').then(function(data) {
        if (data.error) return toast(data.error, 'error')
        renderKeys(data.keys || [])
      })
    }

    function formatDate(d) {
      if (!d) return '-'
      var date = new Date(d)
      return date.toLocaleDateString('ar-EG') + ' ' + date.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' })
    }

    function renderKeys(keys) {
      var total = keys.length
      var active = 0
      for (var i = 0; i < keys.length; i++) {
        if (keys[i].is_active) active++
      }
      var totalActivations = 0
      for (var i = 0; i < keys.length; i++) {
        if (keys[i].activations) totalActivations += keys[i].activations.length
      }

      document.getElementById('stats').innerHTML =
        '<div class="stat"><div class="stat-value">' + total + '</div><div class="stat-label">إجمالي المفاتيح</div></div>' +
        '<div class="stat"><div class="stat-value">' + active + '</div><div class="stat-label">نشط</div></div>' +
        '<div class="stat"><div class="stat-value">' + (total - active) + '</div><div class="stat-label">ملغي</div></div>' +
        '<div class="stat"><div class="stat-value">' + totalActivations + '</div><div class="stat-label">أجهزة مفعلة</div></div>'

      if (!keys.length) {
        document.getElementById('keys-table').innerHTML = '<div style="color:#64748b;text-align:center;padding:20px">لا توجد مفاتيح</div>'
        return
      }

      var html = '<table><thead><tr>' +
        '<th>المفتاح</th><th>النوع</th><th>الحالة</th><th>التفعيلات</th><th>وقت التفعيل</th><th>تاريخ الانتهاء</th><th>آخر تفعيل</th><th>ملاحظات</th><th>تاريخ الإنشاء</th><th></th>' +
        '</tr></thead><tbody>'

      for (var i = 0; i < keys.length; i++) {
        var k = keys[i]
        var activations = k.activations || []
        var activeActivations = []
        for (var j = 0; j < activations.length; j++) {
          if (activations[j].is_active) activeActivations.push(activations[j])
        }
        var sorted = activeActivations.sort(function(a, b) {
          return new Date(b.activated_at) - new Date(a.activated_at)
        })
        var lastActivation = sorted[0]
        var lastActivationDate = lastActivation ? formatDate(lastActivation.activated_at) : '-'

        // Get decoded activated_at (earliest activation)
        var firstAct = null
        for (var j = 0; j < activations.length; j++) {
          if (!firstAct || new Date(activations[j].activated_at) < new Date(firstAct.activated_at)) {
            firstAct = activations[j]
          }
        }
        var activatedAtDisplay = firstAct ? formatDate(firstAct.decoded_activated_at || firstAct.activated_at) : '-'

        // Get decoded expires_at from first/last activation
        var expiresAtDisplay = '-'
        if (k.license_type === 'lifetime') {
          expiresAtDisplay = 'مدى الحياة'
        } else if (lastActivation && lastActivation.decoded_expires_at) {
          expiresAtDisplay = formatDate(lastActivation.decoded_expires_at)
        } else if (k.expires_at) {
          expiresAtDisplay = formatDate(k.expires_at)
        }

        var typeLabel = k.license_type === 'lifetime' ? 'مدى الحياة' : k.license_type === 'year' ? 'سنة' : k.license_type === 'half_year' ? '6 أشهر' : k.license_type === 'quarter' ? '3 أشهر' : 'شهر'
        var statusLabel = k.is_active ? 'نشط' : 'ملغي'
        var statusClass = k.is_active ? 'badge-active' : 'badge-inactive'
        var actionHtml = ''
        if (k.is_active) {
          actionHtml = '<button class="btn btn-warning btn-action" data-action="revoke" data-id="' + k.id + '">إلغاء</button>'
        } else {
          actionHtml = '<button class="btn btn-success btn-action" data-action="reactivate" data-id="' + k.id + '">تفعيل</button>'
        }
        actionHtml += '<button class="btn btn-danger btn-action" data-action="delete" data-id="' + k.id + '">حذف</button>'

        html += '<tr>' +
          '<td style="direction:ltr;font-size:11px;font-family:monospace">' + k.key_string + ' <button class="btn btn-primary btn-copy-key" data-key="' + k.key_string.replace(/'/g, '&#39;') + '" style="padding:2px 6px;font-size:10px">نسخ</button></td>' +
          '<td><span class="badge badge-lifetime">' + typeLabel + '</span></td>' +
          '<td><span class="badge ' + statusClass + '">' + statusLabel + '</span></td>' +
          '<td>' + (k.current_activations || 0) + ' / ' + k.max_activations + '</td>' +
          '<td style="font-size:11px">' + activatedAtDisplay + '</td>' +
          '<td style="font-size:11px">' + expiresAtDisplay + '</td>' +
          '<td style="font-size:11px">' + lastActivationDate + '</td>' +
          '<td style="font-size:11px;color:#94a3b8">' + (k.notes || '-') + '</td>' +
          '<td style="font-size:11px">' + formatDate(k.created_at) + '</td>' +
          '<td><div class="actions">' + actionHtml + '</div></td>' +
          '</tr>'
      }

      html += '</tbody></table>'
      document.getElementById('keys-table').innerHTML = html
    }

    function createNewKey() {
      var type = document.getElementById('newKeyType').value
      apiCall('/createKey', 'POST', { license_type: type }).then(function(data) {
        if (data.error) return toast(data.error, 'error')
        lastCreatedKey = data.key.key_string
        document.getElementById('newKeyValue').textContent = lastCreatedKey
        document.getElementById('newKeyResult').classList.remove('hidden')
        toast('تم إنشاء المفتاح بنجاح')
        loadKeys()
      })
    }

    function revokeKey(id) {
      if (!confirm('إلغاء تفعيل هذا المفتاح؟')) return
      apiCall('/revokeKey', 'POST', { id: id, action: 'revoke' }).then(function(data) {
        if (data.error) return toast(data.error, 'error')
        toast('تم إلغاء المفتاح')
        loadKeys()
      })
    }

    function reactivateKey(id) {
      apiCall('/revokeKey', 'POST', { id: id, action: 'reactivate' }).then(function(data) {
        if (data.error) return toast(data.error, 'error')
        toast('تم تفعيل المفتاح')
        loadKeys()
      })
    }

    function deleteKey(id) {
      if (!confirm('حذف هذا المفتاح نهائياً؟ سيتم حذف جميع التفعيلات.')) return
      apiCall('/revokeKey', 'POST', { id: id, action: 'delete' }).then(function(data) {
        if (data.error) return toast(data.error, 'error')
        toast('تم حذف المفتاح')
        loadKeys()
      })
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('loginBtn').addEventListener('click', login)
      document.getElementById('createKeyBtn').addEventListener('click', createNewKey)
      document.getElementById('copyKeyBtn').addEventListener('click', function() {
        navigator.clipboard.writeText(lastCreatedKey).then(function() { toast('تم نسخ المفتاح') })
      })
      document.getElementById('closeResultBtn').addEventListener('click', function() {
        document.getElementById('newKeyResult').classList.add('hidden')
      })
      document.getElementById('adminKeyInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') login()
      })

      document.getElementById('keys-table').addEventListener('click', function(e) {
        var target = e.target
        if (target.classList.contains('btn-copy-key')) {
          var key = target.getAttribute('data-key')
          navigator.clipboard.writeText(key).then(function() { toast('تم النسخ') })
          return
        }
        if (target.classList.contains('btn-action')) {
          var id = target.getAttribute('data-id')
          var action = target.getAttribute('data-action')
          if (action === 'revoke') revokeKey(id)
          else if (action === 'reactivate') reactivateKey(id)
          else if (action === 'delete') deleteKey(id)
        }
      })
    })
  </script>
</body>
</html>
