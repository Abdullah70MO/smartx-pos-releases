name: Build and Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
